<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Dashboard</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html, body{
  width:100%;
  overflow-x:hidden;   /* 🔥 Prevent X scroll */
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* ===== HERO SECTION ===== */
.hero{
  min-height:100vh;
  width:100%;
  background:linear-gradient(135deg,#1e293b,#0f172a);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

.hero h1{
  font-size:clamp(2rem,5vw,4rem);
}

.hero p{
  margin-top:15px;
  font-size:clamp(1rem,2.5vw,1.3rem);
  opacity:0.8;
}

/* ===== BUTTONS ===== */
.hero-buttons{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:15px;
  width:100%;
  max-width:300px;
}

.btn{
  padding:14px 20px;
  width:100%;
  border-radius:6px;
  font-size:1rem;
  text-decoration:none;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.3s;
  cursor:pointer;
}

/* Enter */
.btn-enter{
  background:#ff914d;
  color:white;
  border:none;
}
.btn-enter:hover{
  background:#ff6a00;
  transform:scale(1.05);
}

/* Back */
.btn-back{
  border:2px solid white;
  color:white;
}
.btn-back:hover{
  background:white;
  color:#0f172a;
  transform:scale(1.05);
}

/* ===== DASHBOARD ===== */
.dashboard{
  padding:40px 15px;
}

.charts-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  width:100%;
}

.chart-card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
  overflow:hidden;
  transition:0.3s;
}

.chart-card:hover{
  transform:translateY(-5px);
}

.chart-card h3{
  text-align:center;
  margin-bottom:15px;
}

canvas{
  width:100% !important;
  height:auto !important;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Dashboard Overview</h1>
  <p>Real-Time Sales | Revenue | Reports</p>

  <div class="hero-buttons">
    <button class="btn btn-enter" onclick="scrollToCharts()">Enter Dashboard</button>
    <a href="./home2.html" class="btn btn-back">⬅ Back</a>
  </div>
</section>

<!-- DASHBOARD -->
<section class="dashboard">
  <div class="charts-container">

    <div class="chart-card">
      <h3>Sales Distribution</h3>
      <canvas id="pieChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Monthly Revenue</h3>
      <canvas id="barChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Weekly Visitors</h3>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Target Completion</h3>
      <canvas id="gaugeChart"></canvas>
    </div>

  </div>
</section>

<script>

/* Smooth Scroll */
function scrollToCharts(){
  document.querySelector(".dashboard").scrollIntoView({behavior:"smooth"});
}

/* PIE */
new Chart(document.getElementById("pieChart"),{
  type:"pie",
  data:{
    labels:["Men","Women","Kids"],
    datasets:[{
      data:[40,35,25],
      backgroundColor:["#ff6384","#36a2eb","#ffce56"]
    }]
  }
});

/* BAR */
new Chart(document.getElementById("barChart"),{
  type:"bar",
  data:{
    labels:["Jan","Feb","Mar","Apr"],
    datasets:[{
      label:"Revenue",
      data:[12000,15000,10000,18000],
      backgroundColor:"#36a2eb"
    }]
  }
});

/* LINE */
new Chart(document.getElementById("lineChart"),{
  type:"line",
  data:{
    labels:["Mon","Tue","Wed","Thu","Fri"],
    datasets:[{
      label:"Visitors",
      data:[120,190,300,250,220],
      borderColor:"#ff914d",
      backgroundColor:"transparent",
      tension:0.4
    }]
  }
});

/* GAUGE */
new Chart(document.getElementById("gaugeChart"),{
  type:"doughnut",
  data:{
    labels:["Completed","Remaining"],
    datasets:[{
      data:[75,25],
      backgroundColor:["#22c55e","#334155"]
    }]
  },
  options:{
    circumference:180,
    rotation:270,
    cutout:"70%"
  }
});

</script>

</body>
</html>
