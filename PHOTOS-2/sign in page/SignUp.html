<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./Signin.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <section>
        <div class="sectiom-top">
            <img src="./WhatsApp_Image_2026-02-19_at_11.45.19_AM-removebg-preview.png" alt="">
            <h3>Sign up to Digital Marketing</h3>
        </div>
        <div class="section-bot">
            <div class="signin-field">
                <label>Full Name</label>
                <input type="text">
            </div>
            <div class="signin-field">
                <label>Email</label>
                <input type="text">
            </div>
            <div class="signin-field">
                <label>Password</label>
                <input type="password">
            </div>
            <div class="signin-rem">
                <nav>
                    <input type="checkbox">
                    <label for="">I certify that I am 18 years of age or older, and agree to the <p>User Agreement</p> and
                       <p> Privacy Policy.</p></label>
                </nav>
                <!-- <p>Forgot Password?</p> -->
            </div>
            <button>Sign Up</button>
            <h3><label for="">Sign in</label> into your account</h3>
            <!-- <p>Don't have an account? <label for="">Sign up</label></p> -->
        </div>
    </section>
</body>

</html>
