<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorful E-Commerce Dashboard</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css"
    integrity="sha512-1cK78a1o+ht2JcaW6g8OXYwqpev9+6GqOkz9xmBN9iUUhIndKtxwILGWYOSibOKjLsEdjyjZvYDq/cZwNeak0w=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"
    integrity="sha512-A7AYk1fGKX6S2SsHywmPkrnzTZHrgiVT7GcQkLGDe2ev0aWb8zejytzS8wjo7PGEXKqJOrjQ4oORtnimIRZBtw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>


  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #f5f7fa;
      color: black;
    }

    .dashboard {
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: linear-gradient(180deg, #4b6cb7, #182848);
      padding: 20px;
      color: #fff;
    }

    .logo {
      text-align: center;
      margin-bottom: 30px;
      font-size: 22px;
      font-weight: bold;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar li {
      padding: 12px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.3s;
    }

    .sidebar li:hover,
    .sidebar .active {
      background: #2b3a67;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 30px;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    /* .ul>li>a{
  text-decoration: none;
  color: white;
} */

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.08);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #555;
    }

    .card p {
      font-size: 24px;
      font-weight: bold;
      color: #222;
    }

    /* Bright colors */
    .card:nth-child(1) {
      border-left: 6px solid #ff6384;
    }

    .card:nth-child(2) {
      border-left: 6px solid #36a2eb;
    }

    .card:nth-child(3) {
      border-left: 6px solid #ffce56;
    }

    .card:nth-child(4) {
      border-left: 6px solid #4bc0c0;
    }

    /* Charts */
    .charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .dashboard>li>a {
      text-decoration: none;
    }

    .chart-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.08);
    }

    /* Table */
    .table-section {
      margin-top: 30px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th,
    td {
      padding: 12px;
      text-align: left;
    }

    th {
      background: #4b6cb7;
      color: #fff;
    }

    tr:nth-child(even) {
      background: #f3f3f3;
    }

    .status-delivered {
      color: #28a745;
      font-weight: bold;
    }

    .status-pending {
      color: #ffc107;
      font-weight: bold;
    }

    .status-cancelled {
      color: #dc3545;
      font-weight: bold;
    }

    .table-section{
      overflow-x: scroll;
    }

    /* Responsive */
    @media(max-width:768px) {

      /* .sidebar{ display:none; } */
      .dashboard {
        flex-direction: column;
      }

      
      .sidebar {
        width: 100%;
      }

      .sidebar li {
        width: fit-content;
      }
    }

    .sidebar>ul>li>a {
      text-decoration: none;
      color: white;

    }
  </style>

</head>

<body>

  <div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">PRO SHOP </div>
      <ul>
        <li class="active">Dashboard</li>
        <!-- <li>Orders</li>
      <li>Products</li>
      <li>Customers</li>
      <li>Analytics</li> -->
        <li><a href="index.html">Go Back</a></li>
      </ul>
    </aside>

    <!-- Main -->
    <main class="main">
      <h1>Dashboard Overview</h1>

      <!-- Cards -->
      <div class="cards">
        <div class="card">
          <h3>Total Revenue</h3>
          <p>₹3,45,000</p>
        </div>
        <div class="card">
          <h3>Total Orders</h3>
          <p>1,890</p>
        </div>
        <div class="card">
          <h3>Customers</h3>
          <p>1,120</p>
        </div>
        <div class="card">
          <h3>Products</h3>
          <p>540</p>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts">
        <div class="chart-box"><canvas id="salesChart"></canvas></div>
        <div class="chart-box"><canvas id="ordersChart"></canvas></div>
        <div class="chart-box"><canvas id="trafficChart"></canvas></div>
      </div>

      <!-- Table -->
      <div class="table-section">
        <h2>Recent Orders</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Amount</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>#3011</td>
              <td>Aditi</td>
              <td>Sneakers</td>
              <td>₹3,800</td>
              <td class="status-delivered">Delivered</td>
            </tr>
            <tr>
              <td>#3012</td>
              <td>Rohan</td>
              <td>Watch</td>
              <td>₹4,200</td>
              <td class="status-pending">Pending</td>
            </tr>
            <tr>
              <td>#3013</td>
              <td>Sneha</td>
              <td>Bag</td>
              <td>₹1,450</td>
              <td class="status-cancelled">Cancelled</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script>
    // Sales Line Chart
    new Chart(document.getElementById("salesChart"), {
      type: 'line',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [
          {
            label: 'Sales (₹)',
            data: [25000, 34000, 29000, 42000, 38000, 46000],
            borderColor: '#ff6384',
            backgroundColor: 'rgba(255,99,132,0.2)',
            fill: true
          }
        ]
      }
    });

    // Orders Bar Chart
    new Chart(document.getElementById("ordersChart"), {
      type: 'bar',
      data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [
          {
            label: 'Orders',
            data: [180, 240, 270, 330, 390, 450],
            backgroundColor: '#36a2eb',
          }
        ]
      }
    });

    // Traffic Pie Chart
    new Chart(document.getElementById("trafficChart"), {
      type: 'pie',
      data: {
        labels: ['Direct', 'Social', 'Email', 'Ads'],
        datasets: [
          {
            data: [45, 25, 20, 10],
            backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0']
          }
        ]
      }
    });
  </script>
  <script>
    AOS.init({
      duration: 400,
      easing: 'ease-in-out',
      once: true,
    });

  </script>

</body>

</html>
